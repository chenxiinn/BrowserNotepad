<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>打开备忘录</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 200px; padding: 15px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    h3 { font-size: 14px; margin-bottom: 12px; color: #1e293b; }
    .btn { width: 100%; padding: 12px; margin-bottom: 8px; border: none; border-radius: 8px; cursor: pointer; font-size: 13px; transition: all 0.2s; }
    .btn-sidebar { background: linear-gradient(135deg, #6366f1, #4f46e5); color: white; }
    .btn-sidebar:hover { background: linear-gradient(135deg, #4f46e5, #4338ca); }
    .btn-floating { background: #f1f5f9; color: #1e293b; border: 1px solid #e2e8f0; }
    .btn-floating:hover { background: #e2e8f0; }
    .desc { font-size: 11px; color: #64748b; margin-top: 10px; text-align: center; }
  </style>
</head>
<body>
  <h3>📝 Chrome 备忘录</h3>
  <button class="btn btn-sidebar" id="btnSidebar">📑 在侧边栏打开</button>
  <button class="btn btn-floating" id="btnFloating">🪟 悬浮窗打开</button>
  <p class="desc">侧边栏模式：固定在浏览器右侧<br>悬浮窗模式：独立窗口，可拖动</p>
  <script src="popup.js"></script>
</body>
</html>
